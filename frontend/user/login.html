<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden - PC Parts Shop</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <div class="login-wrap">
    <h1>PC Parts Shop</h1>

    <div class="form-card">
      <div class="tabs">
        <div class="tab active" data-tab="login">Anmelden</div>
        <div class="tab" data-tab="register">Registrieren</div>
        <div class="tab" data-tab="magic">Magic Link</div>
      </div>

      <div id="alert-box"></div>

      <!-- LOGIN -->
      <div class="panel active" id="panel-login">
        <form id="form-login">
          <div class="form-group">
            <label>E-Mail</label>
            <input type="email" id="login-email" required>
          </div>
          <div class="form-group">
            <label>Passwort</label>
            <input type="password" id="login-password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Anmelden</button>
        </form>
      </div>

      <!-- REGISTER -->
      <div class="panel" id="panel-register">
        <form id="form-register">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="reg-name" required>
          </div>
          <div class="form-group">
            <label>E-Mail</label>
            <input type="email" id="reg-email" required>
          </div>
          <div class="form-group">
            <label>Passwort</label>
            <input type="password" id="reg-password" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-full">Registrieren</button>
        </form>
      </div>

      <!-- MAGIC LINK -->
      <div class="panel" id="panel-magic">
        <p class="magic-hint">Erhalte einen Anmeldelink per E-Mail - kein Passwort nötig.</p>
        <form id="form-magic">
          <div class="form-group">
            <label>E-Mail</label>
            <input type="email" id="magic-email" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Link senden</button>
        </form>
        <div class="divider">oder Code eingeben</div>
        <form id="form-magic-code">
          <div class="form-group">
            <label>Code</label>
            <input type="text" id="magic-code" placeholder="Token aus der E-Mail">
          </div>
          <button type="submit" class="btn btn-secondary btn-full">Anmelden</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
