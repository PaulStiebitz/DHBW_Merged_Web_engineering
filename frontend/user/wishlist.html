<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wunschlisten - PC Parts Shop</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/wishlist.css">
</head>
<body>
  <nav>
    <span class="brand">PC Parts Shop</span>
    <button class="nav-toggle" aria-label="Menü" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links">
      <a href="/">Produkte</a>
      <a href="/cart.html">Warenkorb</a>
      <a href="/orders.html">Bestellungen</a>
      <a href="/wishlist.html">Wunschlisten</a>
      <button class="btn-logout" id="btn-logout">Abmelden</button>
    </div>
  </nav>

  <div class="container">
    <div class="wishlist-toolbar">
      <h1>Meine Wunschlisten</h1>
      <div class="wishlist-toolbar-actions">
        <button class="btn btn-danger btn-sm" id="btn-delete-by-id">ID löschen</button>
        <button class="btn btn-primary" id="btn-new-list">+ Neue Liste</button>
      </div>
    </div>

    <div id="alert-box"></div>

    <!-- Neue Liste erstellen -->
    <div class="form-card wishlist-new-form" id="form-new-wrap">
      <h2>Neue Wunschliste</h2>
      <form id="form-new-list">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="new-list-name" required>
        </div>
        <div class="form-group">
          <label>Beschreibung</label>
          <textarea id="new-list-desc" rows="2"></textarea>
        </div>
        <div class="wishlist-form-actions">
          <button type="submit" class="btn btn-primary">Erstellen</button>
          <button type="button" class="btn btn-secondary" id="btn-cancel-new">Abbrechen</button>
        </div>
      </form>
    </div>

    <div id="wishlists-container"></div>
  </div>

  <!-- Modal: Berechtigung vergeben -->
  <div id="modal-perm" class="modal-overlay">
    <div class="form-card modal-card" style="max-width:420px;">
      <h2>Berechtigung vergeben</h2>
      <input type="hidden" id="perm-wishlist-id">

      <!-- User-Suche mit Live-Autocomplete -->
      <div class="form-group">
        <label>Benutzer suchen</label>
        <div class="perm-search-wrap">
          <input type="text" id="perm-search-input" class="perm-search-input"
                 placeholder="Name oder E-Mail eingeben..." autocomplete="off">
          <!-- Live-Dropdown -->
          <div id="perm-autocomplete" class="perm-autocomplete"></div>
        </div>
        <!-- Gewählter User -->
        <div id="perm-selected-user" class="perm-selected-user">
          <span id="perm-selected-label"></span>
          <button type="button" id="btn-clear-user" class="perm-clear-btn">&times;</button>
        </div>
        <input type="hidden" id="perm-user-id-hidden">
      </div>

      <!-- Berechtigung -->
      <div class="form-group">
        <label>Berechtigung</label>
        <select id="perm-type">
          <option value="read">Lesen</option>
          <option value="write">Schreiben</option>
        </select>
      </div>

      <div id="modal-alert" class="modal-alert"></div>

      <div class="wishlist-form-actions">
        <button type="button" class="btn btn-primary" id="btn-save-perm">Speichern</button>
        <button type="button" class="btn btn-secondary" id="btn-close-modal">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Modal: Wunschliste per ID löschen -->
  <div id="modal-delete" class="modal-overlay">
    <div class="form-card modal-card" style="max-width:360px;">
      <h2>Wunschliste löschen</h2>
      <div class="form-group">
        <label>Wunschlisten-ID</label>
        <input type="number" id="delete-list-id" class="modal-input"
               placeholder="ID eingeben..." min="1">
      </div>
      <div id="delete-alert" class="modal-alert"></div>
      <div class="wishlist-form-actions">
        <button type="button" class="btn btn-danger" id="btn-confirm-delete-id">Löschen</button>
        <button type="button" class="btn btn-secondary" id="btn-close-delete-modal">Abbrechen</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/wishlist.js"></script>
</body>
</html>
