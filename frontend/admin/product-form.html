<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Produkt</title>
  <link rel="stylesheet" href="/admin/css/style.css">
</head>
<body>
  <nav>
    <span class="brand">Admin Panel</span> 
    <button class="nav-toggle" aria-label="Menü" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links">
      <span class="admin-badge">ADMIN</span>
      <a href="/admin/">Produkte</a>
      <a href="/admin/users.html">User-Verwaltung</a>
      <button class="btn-logout" id="btn-logout">Abmelden</button>
    </div>
  </nav>

  <div class="container">
    <a href="/admin/" style="font-size:0.85rem;color:#64748b;">Zurück zur Übersicht</a>

    <h1 id="page-title" style="margin-top:1rem;">Produkt erstellen</h1>

    <div id="alert-box"></div>

    <div class="form-card" style="max-width:500px;margin-top:0.5rem;">
      <form id="form-product">
        <div class="form-group">
          <label>Name *</label>
          <input type="text" id="p-name" required>
        </div>
        <div class="form-group">
          <label>Beschreibung</label>
          <textarea id="p-desc" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Preis (€) *</label>
          <input type="number" id="p-price" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label>Lagerbestand *</label>
          <input type="number" id="p-quantity" min="0" required>
        </div>
        <div class="form-group">
          <label>Kategorie</label>
          <select id="p-category">
            <option value="">-- keine --</option>
            <option>CPU</option>
            <option>GPU</option>
            <option>RAM</option>
            <option>SSD</option>
            <option>Mainboard</option>
            <option>Netzteil</option>
            <option>Gehäuse</option>
            <option>Kühlung</option>
          </select>
        </div>
        <div style="display:flex;gap:0.5rem;">
          <button type="submit" class="btn btn-primary" id="btn-submit">Speichern</button>
          <a href="/admin/" class="btn btn-secondary">Abbrechen</a>
        </div>
      </form>
    </div>
  </div>

  <script src="/admin/js/api.js"></script>
  <script src="/admin/js/products.js"></script>
</body>
</html>
