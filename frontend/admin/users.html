<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - User-Verwaltung</title>
  <link rel="stylesheet" href="/admin/css/style.css">
</head>
<body>
  <nav>
    <span class="brand">Admin Panel</span>
    <button class="nav-toggle" aria-label="Menü" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links">
      <span class="admin-badge">ADMIN</span>
      <a href="/admin/">Produkte</a>
      <a href="/admin/users.html">User-Verwaltung</a>
      <button class="btn-logout" id="btn-logout">Abmelden</button>
    </div>
  </nav>

  <div class="container">
    <div class="toolbar">
      <h1 style="margin:0;">User-Verwaltung</h1>
      <button class="btn btn-primary" id="btn-new-admin">+ Admin erstellen</button>
    </div>

    <div id="alert-box"></div>

    <!-- Neuen Admin erstellen (einblendbar) -->
    <div class="form-card" id="form-admin-wrap" style="display:none;margin-bottom:1.5rem;max-width:400px;">
      <h2>Neuen Admin erstellen</h2>
      <form id="form-new-admin">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="admin-name" required>
        </div>
        <div class="form-group">
          <label>E-Mail</label>
          <input type="email" id="admin-email" required>
        </div>
        <div class="form-group">
          <label>Passwort</label>
          <input type="password" id="admin-password" required minlength="6">
        </div>
        <div style="display:flex;gap:0.5rem;">
          <button type="submit" class="btn btn-primary">Erstellen</button>
          <button type="button" class="btn btn-secondary" id="btn-cancel-admin">Abbrechen</button>
        </div>
      </form>
    </div>

    <!-- User-Suche -->
    <div class="search-bar">
      <input type="number" id="search-user-id" placeholder="User-ID suchen...">
      <button class="btn btn-primary" id="btn-search-user">Suchen</button>
      <button class="btn btn-secondary" id="btn-load-all">Alle anzeigen</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>E-Mail</th>
            <th>Rolle</th>
            <th>Verifiziert</th>
            <th>Status</th>
            <th>Aktionen</th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="7" style="color:#94a3b8;">Alle anzeigen klicken</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="/admin/js/api.js"></script>
  <script src="/admin/js/users.js"></script>
</body>
</html>
